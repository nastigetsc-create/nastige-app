<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#667eea"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Nastige Industries</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .splash { text-align: center; color: white; }
    .logo { width: 100px; height: 100px; margin-bottom: 16px; object-fit: contain; border-radius: 16px; }
    .app-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .tagline { font-size: 14px; opacity: 0.8; margin-bottom: 24px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="splash">
    <img src="brand/logo" alt="Nastige" class="logo" onerror="this.style.display='none'"/>
    <div class="app-name">Nastige Industries</div>
    <div class="tagline">Connecting Dreams</div>
    <div class="spinner"></div>
  </div>
  <script>
    window.location.href = '/home';
  </script>
</body>
</html>
