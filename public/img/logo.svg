<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 260" role="img" aria-label="Brand Logo Full">
  <title>Brand Logo Full</title>
  <defs>
    <style>
      .orange{fill:#e85a2a}
      .green{fill:#5aa143}
      .dark{fill:#2d2d2d}
      .stroke-green{stroke:#5aa143;stroke-width:6;fill:none;stroke-linecap:round}
      .leaf{fill:#5aa143}
      .text{font-family:Segoe UI, Arial, sans-serif}
    </style>
  </defs>

  <!-- Emblem -->
  <g transform="translate(20,20)">
    <!-- circular wreath -->
    <circle cx="90" cy="90" r="78" class="stroke-green"/>
    <path d="M160,60c12,8 18,20 18,20" class="stroke-green"/>
    <path d="M22,105c-8,10 -12,20 -12,20" class="stroke-green"/>
    <!-- small leaves -->
    <path class="leaf" d="M167 76c12 2 17 11 6 18 -6 4 -15-5-6-18z"/>
    <path class="leaf" d="M20 122c-10 8 -19 4 -16 -6 2 -7 12-9 16 6z"/>

    <!-- stylized N -->
    <g transform="translate(35,28)">
      <!-- left bar -->
      <rect x="0" y="0" width="32" height="124" class="orange" rx="6"/>
      <!-- right bar -->
      <rect x="84" y="0" width="32" height="124" class="orange" rx="6"/>
      <!-- diagonal -->
      <polygon points="24,16 50,16 92,124 66,124" class="orange"/>
      <!-- green stripes -->
      <rect x="0" y="6" width="32" height="6" class="green" opacity="0.9"/>
      <rect x="0" y="20" width="32" height="6" class="green" opacity="0.9"/>
      <rect x="84" y="6" width="32" height="6" class="green" opacity="0.9"/>
      <rect x="84" y="20" width="32" height="6" class="green" opacity="0.9"/>
    </g>
  </g>
  <!-- Wordmark -->
  <g transform="translate(250,85)">
    <text x="0" y="60" font-size="86" font-weight="800" class="text orange">NASTIGE</text>
    <!-- tagline -->
    <g transform="translate(0,84)">
      <rect x="-34" y="-10" width="28" height="6" class="orange" ry="3"/>
      <text x="0" y="22" font-size="34" font-weight="800" letter-spacing="2" class="text green">GROW WITH US</text>
      <rect x="364" y="-10" width="28" height="6" class="orange" ry="3"/>
    </g>
  </g>
</svg>
